
events {
    worker_connections 1024;
}

http {
    # Here is where Nginx learns about your Spring Boot apps
    upstream quora_backend_cluster {
        server host.docker.internal:8081; # Spring Boot Instance 1
        server host.docker.internal:8082; # Spring Boot Instance 2
    }

    server {
        listen 80;

        location / {
            # This line directs Nginx to send the traffic to the cluster above
            proxy_pass http://quora_backend_cluster;

            # These lines tell Nginx to pass the real user's details forward
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}